<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代码语言检测 + 语法高亮 — 效果预览</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<style>
:root {
  --bg: #f5f5f7;
  --card-bg: #ffffff;
  --text: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-muted: #aeaeb2;
  --border: #e5e5ea;
  --accent: #007aff;
  --accent-light: #e8f0fe;
  --section-bg: #f9f9fb;
  --hover: #f0f0f5;
  --danger: #ff3b30;
  --green: #34c759;
  --orange: #ff9500;
  --purple: #af52de;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #e8e8ed;
  margin: 0; padding: 40px 20px;
  display: flex; flex-direction: column; align-items: center;
}

h1 {
  font-size: 24px; font-weight: 700; margin: 0 0 8px;
  color: var(--text);
}
.subtitle {
  font-size: 13px; color: var(--text-secondary); margin-bottom: 30px;
  text-align: center; line-height: 1.6;
}

/* 语言选择标签栏 */
.lang-tabs {
  display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
  margin-bottom: 28px; max-width: 900px;
}
.lang-tab {
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--card-bg); color: var(--text-secondary);
  font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all 0.15s;
}
.lang-tab:hover { border-color: var(--accent); color: var(--accent); }
.lang-tab.active {
  background: var(--accent); color: #fff; border-color: var(--accent);
}

/* 弹窗容器 */
.preview-row {
  display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
  align-items: flex-start;
}

/* 弹窗卡片 */
.dialog-box {
  background: var(--card-bg);
  border-radius: 16px;
  overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  width: 460px; max-width: 95vw;
}
.dialog-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
}
.dialog-title { font-size: 15px; font-weight: 700; margin: 0; }
.dialog-close {
  width: 28px; height: 28px; border-radius: 8px; border: none;
  background: var(--hover); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary);
}
.dialog-body {
  flex: 1; overflow-y: auto; padding: 14px 18px;
  display: flex; flex-direction: column; gap: 10px;
}
.dialog-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px; border-top: 1px solid var(--border);
  background: var(--section-bg); gap: 8px; flex-wrap: nowrap;
}

/* 元信息条 */
.code-meta-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px; border-radius: 8px;
  background: var(--section-bg); border: 1px solid var(--border);
}
.code-meta-left { display: flex; gap: 12px; align-items: center; }
.code-meta-item {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--text-muted);
}
.code-meta-label { font-weight: 500; }
.code-meta-val { font-weight: 700; color: var(--text); }
.code-lang-badge {
  font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px;
  background: var(--accent-light); color: var(--accent);
}

/* 代码查看器 */
.code-viewer {
  display: flex; border-radius: 10px;
  border: 1px solid var(--border); background: var(--card-bg);
  max-height: 45vh; overflow: auto;
}
.code-lines {
  display: flex; flex-direction: column; padding: 10px 0;
  min-width: 36px; text-align: right; user-select: none;
  background: var(--section-bg); border-right: 1px solid var(--border);
  border-radius: 10px 0 0 10px;
}
.code-ln {
  padding: 0 10px; font-family: 'SF Mono', Consolas, monospace;
  font-size: 12px; line-height: 1.7; color: var(--text-muted);
}
.code-text {
  flex: 1; margin: 0; padding: 10px 14px;
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 13px; line-height: 1.7; white-space: pre-wrap;
  word-break: break-all; color: var(--text); overflow: hidden;
}

/* 编辑区 */
.edit-code-area {
  display: flex; border-radius: 10px;
  border: 1.5px solid var(--accent); background: var(--card-bg);
  min-height: 150px; max-height: 45vh; overflow: hidden;
}
.edit-code-area .code-lines {
  min-width: 36px; padding-top: 10px;
  background: var(--section-bg); border-right: 1px solid var(--border);
  border-radius: 10px 0 0 10px;
}
.code-textarea {
  flex: 1; padding: 10px 14px; border: none;
  background: transparent; color: var(--text);
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 13px; line-height: 1.7; resize: vertical; outline: none;
}

/* 工具栏 */
.edit-toolbar {
  display: flex; gap: 4px; flex-wrap: wrap; align-items: center;
}
.tool-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 8px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--card-bg);
  color: var(--text-secondary); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.tool-btn:hover { border-color: var(--accent); color: var(--accent); }
.tool-separator {
  width: 1px; height: 18px; background: var(--border); margin: 0 4px;
}
.tool-hint {
  margin-left: auto; font-size: 11px; color: var(--accent);
  background: none; border: none; cursor: pointer; font-family: inherit;
}

/* 操作栏 */
.code-actions-bar {
  display: flex; align-items: center; justify-content: space-between;
}
.btn-ghost {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--card-bg);
  color: var(--text-secondary); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.btn-ghost:hover { background: var(--hover); color: var(--text); }
.btn-primary {
  padding: 5px 14px; border-radius: 8px; border: none;
  background: var(--accent); color: #fff;
  font-size: 12px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: all 0.15s;
}
.btn-primary:hover { opacity: 0.85; }

/* 支持的语言列表 */
.lang-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 6px; margin-top: 16px; max-width: 900px;
}
.lang-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: 6px;
  background: var(--card-bg); border: 1px solid var(--border);
  font-size: 11px; color: var(--text-secondary);
}
.lang-chip .dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}

h3 { font-size: 16px; margin: 30px 0 12px; color: var(--text); }
h4 { font-size: 13px; margin: 0 0 8px; color: var(--text-secondary); }

/* highlight.js 主题微调 */
.hljs { background: transparent !important; padding: 0 !important; }
</style>
</head>
<body>

<h1>🔬 代码语言检测 + 语法高亮</h1>
<p class="subtitle">
  集成 highlight.js · 支持 190+ 语言 · 自动推断具体语言类型<br>
  badge 从「💻 代码」升级为「💻 Python」「💻 JavaScript」等具体语言名
</p>

<!-- 语言标签切换 -->
<div class="lang-tabs" id="langTabs"></div>

<!-- 预览区：只读 QuickPreview + 编辑 EditDialog 并排 -->
<div class="preview-row" id="previewRow"></div>

<!-- 支持的语言列表 -->
<h3>📋 支持的语言检测规则（15 种）</h3>
<div class="lang-grid" id="langGrid"></div>

const samples = {

import { useState, useEffect } from "react";

function useCounter(initial = 0) {
  const [count, setCount] = useState(initial);

  useEffect(() => {
    const timer = setInterval(() => {
      setCount(c => c + 1);
    }, 1000);
    return () => clearInterval(timer);
  }, []);

  return { count, reset: () => setCount(initial) };
}

export default useCounter;`,

import pandas as pd
from typing import List, Dict

def process_data(items: List[Dict]) -> pd.DataFrame:

  Rust: {

    code: `// 异步 TCP 服务
use tokio::net::TcpListener;
use std::sync::Arc;

#[derive(Debug, Clone)]
struct AppState {
    counter: Arc<Mutex<u64>>,
}

impl AppState {
    pub fn new() -> Self {
        Self { counter: Arc::new(Mutex::new(0)) }
    }
}

#[tokio::main]
async fn main() -> Result<(), Box<dyn Error>> {
    let state = AppState::new();
    let listener = TcpListener::bind("0.0.0.0:8080").await?;

    loop {
        let (socket, _) = listener.accept().await?;
        tokio::spawn(handle(socket, state.clone()));
    }
}`,

    code: `// 快速排序
#include <stdio.h>
#include <stdlib.h>
#include <string.h>

void swap(int *a, int *b) {
    int temp = *a;
    *a = *b;
    *b = temp;
}

int partition(int arr[], int low, int high) {
    int pivot = arr[high];
    int i = (low - 1);
    for (int j = low; j < high; j++) {
        if (arr[j] <= pivot) {
            i++;
            swap(&arr[i], &arr[j]);
        }
    }
    swap(&arr[i + 1], &arr[high]);
    return (i + 1);
}`,

  CSS: {

    code: `/* 主题变量 */

// ========== 渲染语言标签 ==========
const langTabs = document.getElementById('langTabs');
const langGrid = document.getElementById('langGrid');
const previewRow = document.getElementById('previewRow');
const langKeys = Object.keys(samples);

langKeys.forEach((key, i) => {
  const btn = document.createElement('button');
  btn.className = 'lang-tab' + (i === 0 ? ' active' : '');
  btn.textContent = key;
  btn.onclick = () => {
    document.querySelectorAll('.lang-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPreview(key);
  };
  langTabs.appendChild(btn);
});

// 渲染支持语言网格
langKeys.forEach(key => {
  const s = samples[key];
  const chip = document.createElement('div');
  chip.className = 'lang-chip';
  chip.innerHTML = `<span class="dot" style="background:${s.color}"></span>${s.label}<span style="margin-left:auto;font-size:10px;color:var(--text-muted)">${s.rule}</span>`;
  langGrid.appendChild(chip);
});

// ========== 渲染预览弹窗 ==========
function renderPreview(langKey) {
  const s = samples[langKey];
  const lines = s.code.split('\n');

  const lineNumbers = lines.map((_, i) => `<span class="code-ln">${i + 1}</span>`).join('');

  previewRow.innerHTML = `
    <!-- 只读预览 QuickPreview -->
    <div class="dialog-box">
      <div class="dialog-header">
        <h2 class="dialog-title">📄 快速预览</h2>
        <button class="dialog-close">✕</button>
      </div>
      <div class="dialog-body">
        <div class="code-meta-bar">
          <div class="code-meta-left">
            <div class="code-meta-item"><span class="code-meta-label">行</span><span class="code-meta-val">${lines.length}</span></div>
            <div class="code-meta-item"><span class="code-meta-label">字符</span><span class="code-meta-val">${s.code.length}</span></div>
          </div>
          <div class="code-lang-badge">💻 ${s.label}</div>
        </div>
        <div class="code-viewer">
          <div class="code-lines">${lineNumbers}</div>
          <pre class="code-text"><code class="language-${getHighlightLang(langKey)}">${escapeHtml(s.code)}</code></pre>
        </div>
        <div class="code-actions-bar">
          <span style="font-size:10px;color:var(--text-muted)">Space / Esc 关闭 · 可选中文本</span>
          <div style="display:flex;gap:4px;flex-shrink:0">
            <button class="btn-ghost">📋 复制</button>
            <button class="btn-ghost">📌 粘贴</button>
          </div>
        </div>
      </div>
      <div class="dialog-footer">
        <span style="font-size:10px;color:var(--text-muted)">来自 VS Code · 刚刚</span>
        <span></span>
      </div>
    </div>

    <!-- 编辑模式 EditDialog -->
    <div class="dialog-box">
      <div class="dialog-header">
        <h2 class="dialog-title">✏️ 编辑记录</h2>
        <button class="dialog-close">✕</button>
      </div>
      <div class="dialog-body">
        <div class="code-meta-bar">
          <div class="code-meta-left">
            <div class="code-meta-item"><span class="code-meta-label">行</span><span class="code-meta-val">${lines.length}</span></div>
            <div class="code-meta-item"><span class="code-meta-label">字符</span><span class="code-meta-val">${s.code.length}</span></div>
          </div>
          <div class="code-lang-badge">💻 ${s.label}</div>
        </div>
        <div class="edit-code-area">
          <div class="code-lines">${lineNumbers}</div>
          <textarea class="code-textarea" spellcheck="false">${escapeHtml(s.code)}</textarea>
        </div>
        <div class="edit-toolbar">
          <button class="tool-btn">🔠 大写</button>
          <button class="tool-btn">🔡 小写</button>
          <button class="tool-btn">✂️ 去空白</button>
          <button class="tool-btn">📐 去空行</button>
          <button class="tool-btn">💬 加引号</button>
          <div class="tool-separator"></div>
          <button class="tool-btn">↩️ 撤销</button>
          <button class="tool-btn">↪️ 重做</button>
          <button class="tool-hint">对比原文 ▾</button>
        </div>
      </div>
      <div class="dialog-footer">
        <span style="font-size:10px;color:var(--text-muted)">Ctrl+Enter 保存 · Esc 取消</span>
        <div style="display:flex;gap:4px;flex-shrink:0;align-items:center">
          <button class="btn-ghost">📋 复制</button>
          <button class="btn-ghost">📌 粘贴</button>
          <button class="btn-ghost">⭐ 存片段</button>
          <button class="btn-primary">💾 保存</button>
        </div>
      </div>
    </div>
  `;

  // highlight.js 重新高亮
  document.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
  });
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function getHighlightLang(key) {
  const map = {
    'JavaScript': 'javascript',
    'TypeScript': 'typescript',
    'Python': 'python',
    'Rust': 'rust',
    'Go': 'go',
    'Java': 'java',
    'C/C++': 'cpp',
    'SQL': 'sql',
    'Bash/Shell': 'bash',
    'JSON': 'json',
    'HTML/XML': 'xml',
    'YAML': 'yaml',
    'CSS': 'css',
    'Markdown': 'markdown',
    '错误日志': 'plaintext'
  };
  return map[key] || 'plaintext';
}

// 初始渲染
renderPreview('JavaScript');
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

</body>
