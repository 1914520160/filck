<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>搜索/筛选区域 — 布局方案对比</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "SF Pro Text", "Microsoft YaHei", system-ui, sans-serif;
    background: #F5F5F7;
    color: #1D1D1F;
    display: flex;
    justify-content: center;
    padding: 24px;
    gap: 32px;
    flex-wrap: wrap;
    -webkit-font-smoothing: antialiased;
  }

  .phone-frame {
    width: 400px;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
    flex-shrink: 0;
  }

  .label {
    text-align: center;
    margin-bottom: 12px;
    font-size: 14px;
    font-weight: 600;
    color: #86868B;
    letter-spacing: 0.5px;
  }

  /* ===== 方案 A: 搜索框 + 下划线标签（当前方案优化） ===== */
  .header-a {
    padding: 16px 16px 0;
  }
  .search-a {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 40px;
    padding: 0 14px;
    border-radius: 10px;
    background: #F5F5F7;
    border: 1.5px solid transparent;
  }
  .search-a .icon { color: #AEAEB2; font-size: 14px; }
  .search-a input {
    flex: 1;
    border: none;
    background: transparent;
    outline: none;
    font-size: 13px;
    color: #1D1D1F;
    font-family: inherit;
  }
  .search-a input::placeholder { color: #AEAEB2; }
  .search-a .clear { color: #AEAEB2; font-size: 14px; cursor: pointer; }

  .tabs-a {
    display: flex;
    gap: 0;
    padding: 12px 0 0;
    border-bottom: 1px solid #E5E5EA;
  }
  .tab-a {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    cursor: pointer;
    border: none;
    background: transparent;
    position: relative;
    font-family: inherit;
  }
  .tab-a .tab-label {
    font-size: 13px;
    font-weight: 500;
    color: #86868B;
  }
  .tab-a.active .tab-label {
    color: #0078D4;
    font-weight: 600;
  }
  .tab-a .tab-count {
    font-size: 10px;
    font-weight: 600;
    color: #AEAEB2;
  }
  .tab-a.active .tab-count { color: #0078D4; }
  .tab-a .underline {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 2px;
    border-radius: 1px;
    background: transparent;
  }
  .tab-a.active .underline {
    background: #0078D4;
  }

  /* ===== 方案 B: 搜索框内嵌 + 药丸标签 ===== */
  .header-b {
    padding: 16px 16px 0;
  }
  .search-b {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 44px;
    padding: 0 14px;
    border-radius: 12px;
    background: #F5F5F7;
    border: 1.5px solid transparent;
  }
  .search-b .icon { color: #AEAEB2; font-size: 15px; }
  .search-b input {
    flex: 1;
    border: none;
    background: transparent;
    outline: none;
    font-size: 14px;
    color: #1D1D1F;
    font-family: inherit;
  }
  .search-b input::placeholder { color: #AEAEB2; }

  .pills-b {
    display: flex;
    gap: 8px;
    padding: 12px 0;
    flex-wrap: wrap;
  }
  .pill-b {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid #E5E5EA;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    color: #86868B;
    transition: all 0.15s;
  }
  .pill-b.active {
    background: #0078D4;
    color: #fff;
    border-color: #0078D4;
  }
  .pill-b .pill-icon { font-size: 13px; }
  .pill-b .pill-count {
    font-size: 10px;
    font-weight: 700;
    background: rgba(0,0,0,0.08);
    padding: 1px 6px;
    border-radius: 8px;
  }
  .pill-b.active .pill-count {
    background: rgba(255,255,255,0.25);
  }

  /* ===== 方案 C: 紧凑单行 ===== */
  .header-c {
    padding: 12px 16px 0;
  }
  .search-c-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .search-c {
    display: flex;
    align-items: center;
    gap: 6px;
    height: 36px;
    padding: 0 12px;
    border-radius: 8px;
    background: #F5F5F7;
    border: 1px solid transparent;
    flex: 1;
  }
  .search-c .icon { color: #AEAEB2; font-size: 13px; }
  .search-c input {
    flex: 1;
    border: none;
    background: transparent;
    outline: none;
    font-size: 13px;
    color: #1D1D1F;
    font-family: inherit;
  }
  .search-c input::placeholder { color: #AEAEB2; }
  .search-c .clear { color: #AEAEB2; font-size: 13px; cursor: pointer; }

  .filter-c-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid #E5E5EA;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: #86868B;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .filter-c-btn:hover { background: #F5F5F7; }

  .chips-c {
    display: flex;
    gap: 6px;
    padding: 10px 0;
    flex-wrap: wrap;
  }
  .chip-c {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 6px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    color: #86868B;
    transition: all 0.15s;
  }
  .chip-c.active {
    background: #EBF3FE;
    color: #0078D4;
    font-weight: 600;
  }
  .chip-c .chip-icon { font-size: 12px; }
  .chip-c .chip-count {
    font-size: 10px;
    font-weight: 700;
    color: #AEAEB2;
  }
  .chip-c.active .chip-count { color: #0078D4; }

  /* ===== 卡片占位 ===== */
  .card-placeholder {
    margin: 8px 16px;
    padding: 12px 14px;
    background: #fff;
    border: 1px solid #E5E5EA;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .card-icon-ph {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: #F5F5F7;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #AEAEB2;
    flex-shrink: 0;
  }
  .card-text-ph {
    flex: 1;
  }
  .card-title-ph {
    font-size: 13px;
    font-weight: 600;
    color: #1D1D1F;
  }
  .card-sub-ph {
    font-size: 11px;
    color: #86868B;
    margin-top: 2px;
  }
</style>
</head>
<body>

<!-- 方案 A: 下划线标签 -->
<div>
  <div class="label">方案 A · 下划线标签</div>
  <div class="phone-frame">
    <div class="header-a">

      <div class="tabs-a">

        </button>
        <button class="tab-a">

        </button>

          <span class="tab-label">收藏</span>

        </button>
      </div>
    </div>
    <div class="card-placeholder">
      <div class="card-icon-ph">📋</div>
      <div class="card-text-ph">
        <div class="card-title-ph">T2170588</div>
        <div class="card-sub-ph">剪贴板管理 v4.0.0 · 31分钟前</div>
      </div>
    </div>
    <div class="card-placeholder">
      <div class="card-icon-ph">📝</div>

        <div class="card-title-ph">1027282</div>
        <div class="card-sub-ph">企业微信 · 37分钟前</div>
      </div>
    </div>
  </div>
</div>

<!-- 方案 B: 药丸标签 -->

  <div class="phone-frame">

<!-- 方案 C: 紧凑单行 -->
<div>
  <div class="label">方案 C · 紧凑单行</div>
  <div class="phone-frame">
    <div class="header-c">
      <div class="search-c-row">
        <div class="search-c">
          <span class="icon">🔍</span>

</body>
</html>
