name: Release

# 当推送 v* 格式的 tag 时触发（如 v5.0.37）
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 5.0.37）"
        required: true

jobs:
  build-and-release:
    name: Build & Release (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 🔑 准备签名密钥（文件路径方式）
        shell: pwsh
        run: |
          $raw = '${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}'
          $keyFile = "${{ runner.temp }}\tauri-signing.key"

          # 写入密钥文件（二进制安全）
          [System.IO.File]::WriteAllText($keyFile, $raw, [System.Text.Encoding]::ASCII)

          # 验证文件
          $content = Get-Content $keyFile -Raw
          $expectedPrefix = 'dW50cnVzdGVk'
          $expectedLength = 348

          Write-Host "========================================"
          Write-Host "  密钥验证"
          Write-Host "========================================"
          Write-Host "Secret 长度: $($raw.Length)"
          Write-Host "文件长度: $($content.Length)"
          Write-Host "期望长度: $expectedLength"
          Write-Host "以 '$expectedPrefix' 开头: $($content.StartsWith($expectedPrefix))"

          if ($content.Length -ne $expectedLength -or -not $content.StartsWith($expectedPrefix)) {
            Write-Host "`n❌ 密钥格式不正确!"
            Write-Host "前30字符: $($content.Substring(0, [Math]::Min(30, $content.Length)))"
            Write-Host "`n修复: 去 GitHub Secrets 更新 TAURI_SIGNING_PRIVATE_KEY"
            Write-Host "值必须以 'dW50cnVzdGVk' 开头, 长度 348 字符"
            Write-Host "正确值来自: npx tauri signer generate --ci 生成的 .key 文件"
            exit 1
          }

          try {
            $decoded = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($content))
            if ($decoded.StartsWith('untrusted comment: rsign encrypted secret key')) {
              Write-Host "✅ 密钥验证通过 (minisign 格式)"
            } else {
              Write-Host "❌ 解码后格式不对: $($decoded.Substring(0, [Math]::Min(40, $decoded.Length)))"
              exit 1
            }
          } catch {
            Write-Host "❌ Base64 解码失败: $($_.Exception.Message)"
            exit 1
          }

          # 设置文件路径供后续步骤使用
          "TAURI_KEY_FILE=$keyFile" >> $env:GITHUB_ENV
          Write-Host "密钥文件: $keyFile"
          Write-Host "========================================"

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 启用 sccache 缓存
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: 安装前端依赖
        run: |
          rm package-lock.json -ErrorAction SilentlyContinue
          rm -r node_modules -ErrorAction SilentlyContinue
          npm install

      - name: 构建 Tauri 应用
        shell: pwsh
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: |
          $env:TAURI_SIGNING_PRIVATE_KEY = $env:TAURI_KEY_FILE
          npx tauri build

      - name: 列出构建产物（调试）
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== nsis 目录 ==="
          if (Test-Path src-tauri/target/release/bundle/nsis/) {
            Get-ChildItem src-tauri/target/release/bundle/nsis/
          } else {
            Write-Host "nsis 目录不存在"
          }
          Write-Host ""
          Write-Host "=== 查找 .sig 文件 ==="
          $sigFiles = Get-ChildItem -Recurse src-tauri/target/release/bundle/ -Filter "*.sig" -ErrorAction SilentlyContinue
          if ($sigFiles) { $sigFiles } else { Write-Host "未找到 .sig 文件" }
          Write-Host ""
          Write-Host "=== 查找 .exe 文件 ==="
          $exeFiles = Get-ChildItem -Recurse src-tauri/target/release/bundle/ -Filter "*.exe" -ErrorAction SilentlyContinue
          if ($exeFiles) { $exeFiles } else { Write-Host "未找到 .exe 文件" }

      - name: 打包绿色便携版
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $exePath = "src-tauri/target/release/PastePanda.exe"
          $zipName = "PastePanda_$version`_x86_64-pc-windows-msvc.zip"

          if (-not (Test-Path $exePath)) {
            Write-Host "❌ 绿色版 exe 不存在: $exePath"
            exit 1
          }

          $exeDir = Split-Path $exePath -Parent
          $exeName = Split-Path $exePath -Leaf
          $zipFullPath = Join-Path $env:GITHUB_WORKSPACE $zipName
          Push-Location $exeDir
          Compress-Archive -Path $exeName -DestinationPath $zipFullPath -Force
          Pop-Location

          Write-Host "✅ 绿色版打包完成: $zipName"
          Write-Host "文件大小: $((Get-Item $zipFullPath).Length / 1MB) MB"

      - name: 生成 updater.json
        run: node scripts/generate-updater-json.mjs
        env:
          GITHUB_RELEASE_TAG: ${{ github.ref_name }}

      - name: 提取更新日志
        id: changelog
        shell: pwsh
        run: |
          # 查找上一个 tag
          $prevTag = git describe --tags --abbrev=0 --exclude=NEW ${{ github.ref_name }} 2>$null
          if (-not $prevTag) { $prevTag = "" }

          # 提取自上一个 tag 以来的 commit message
          if ($prevTag) {
            $logs = git log "${prevTag}..${{ github.ref_name }}" --pretty=format:"- %s" --no-merges
          } else {
            $logs = git log ${{ github.ref_name }} --pretty=format:"- %s" --no-merges -n 10
          }

          if (-not $logs) { $logs = "常规构建发布" }

          # 第一条 commit message 作为 Release name
          $firstCommit = ($logs -split "`n" | Select-Object -First 1) -replace "^- ", ""

          "first_commit=$firstCommit" >> $env:GITHUB_OUTPUT
          "logs<<EOF" >> $env:GITHUB_OUTPUT
          $logs >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT
          Write-Host "更新日志：$logs"

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "PastePanda ${{ github.ref_name }} - ${{ steps.changelog.outputs.first_commit }}"
          body: |
            ## PastePanda ${{ github.ref_name }}

            ${{ steps.changelog.outputs.first_commit }}

            ### 📝 更新内容
            ${{ steps.changelog.outputs.logs }}

            ### 📦 下载
            - **安装版**：下载 `PastePanda_*_x64-setup.exe`，运行安装程序（支持自动更新）
            - **绿色便携版**：下载 `PastePanda_*_x86_64-pc-windows-msvc.zip`，解压即用（更新后变为已安装状态）
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            PastePanda_*_x86_64-pc-windows-msvc.zip
            dist/updater.json
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
