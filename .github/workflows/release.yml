name: Release

# 当推送 v* 格式的 tag 时触发（如 v5.0.37）
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 5.0.37）"
        required: true

jobs:
  build-and-release:
    name: Build & Release (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 🔑 验证签名密钥格式
        shell: pwsh
        run: |
          $raw = '${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}'
          $expectedPrefix = 'dW50cnVzdGVk'
          $expectedLength = 348

          Write-Host "========================================"
          Write-Host "  密钥验证"
          Write-Host "========================================"
          Write-Host "长度: $($raw.Length) (期望: $expectedLength)"
          Write-Host "以 '$expectedPrefix' 开头: $($raw.StartsWith($expectedPrefix))"

          # 严格验证
          $errors = @()
          if ($raw.Length -ne $expectedLength) {
            $errors += "长度错误! 当前 $($raw.Length), 期望 $expectedLength"
          }
          if (-not $raw.StartsWith($expectedPrefix)) {
            $errors += "格式错误! 不是 minisign 格式密钥"
          }

          # 验证 base64 解码
          try {
            $decoded = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($raw))
            if ($decoded.StartsWith('untrusted comment: rsign encrypted secret key')) {
              Write-Host "✅ Base64解码成功, 密钥格式正确 (minisign)"
            } else {
              $errors += "解码后内容格式不正确: $($decoded.Substring(0, [Math]::Min(40, $decoded.Length)))"
            }
          } catch {
            $errors += "Base64解码失败: $($_.Exception.Message)"
          }

          if ($errors.Count -gt 0) {
            Write-Host "`n❌ 验证失败:"
            $errors | ForEach-Object { Write-Host "  - $_" }
            Write-Host "`n修复方法:"
            Write-Host "  1. 确保运行了 'npx tauri signer generate --ci' 生成新密钥"
            Write-Host "  2. 把 .key 文件内容完整复制到 GitHub Secrets → TAURI_SIGNING_PRIVATE_KEY"
            Write-Host "  3. 密钥应以 'dW50cnVzdGVk' 开头, 长度 348 字符"
            exit 1
          } else {
            Write-Host "`n✅ 密钥验证全部通过, 继续构建..."
          }
          Write-Host "========================================"

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装前端依赖
        run: |
          rm package-lock.json -ErrorAction SilentlyContinue
          rm -r node_modules -ErrorAction SilentlyContinue
          npm install

      - name: 构建 Tauri 应用
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npx tauri build

      - name: 列出构建产物（调试）
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== nsis 目录 ==="
          if (Test-Path src-tauri/target/release/bundle/nsis/) {
            Get-ChildItem src-tauri/target/release/bundle/nsis/
          } else {
            Write-Host "nsis 目录不存在"
          }
          Write-Host ""
          Write-Host "=== 查找 .sig 文件 ==="
          $sigFiles = Get-ChildItem -Recurse src-tauri/target/release/bundle/ -Filter "*.sig" -ErrorAction SilentlyContinue
          if ($sigFiles) { $sigFiles } else { Write-Host "未找到 .sig 文件" }
          Write-Host ""
          Write-Host "=== 查找 .exe 文件 ==="
          $exeFiles = Get-ChildItem -Recurse src-tauri/target/release/bundle/ -Filter "*.exe" -ErrorAction SilentlyContinue
          if ($exeFiles) { $exeFiles } else { Write-Host "未找到 .exe 文件" }

      - name: 生成 updater.json
        run: node scripts/generate-updater-json.mjs
        env:
          APP_VERSION: ${{ github.ref_name }}
          GITHUB_RELEASE_TAG: ${{ github.ref_name }}

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Filck ${{ github.ref_name }}"
          body: |
            ## Filck ${{ github.ref_name }}

            自动构建版本。

            ### 安装说明
            - **Windows**: 下载 `Filck_*.exe` 安装程序
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            dist/updater.json
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
